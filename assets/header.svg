<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="800" height="300">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="300" fill="url(#glow)"/>

  <!-- Stars (scattered pixels) -->
  <g shape-rendering="crispEdges" fill="#ffffff" opacity="0.9">
    <rect x="45" y="25" width="2" height="2"/>
    <rect x="120" y="55" width="2" height="2"/>
    <rect x="200" y="18" width="3" height="3"/>
    <rect x="310" y="42" width="2" height="2"/>
    <rect x="380" y="15" width="2" height="2"/>
    <rect x="480" y="60" width="2" height="2"/>
    <rect x="555" y="28" width="3" height="3"/>
    <rect x="650" y="50" width="2" height="2"/>
    <rect x="720" y="22" width="2" height="2"/>
    <rect x="760" y="65" width="2" height="2"/>
    <rect x="90" y="90" width="2" height="2"/>
    <rect x="170" y="75" width="2" height="2"/>
    <rect x="440" y="85" width="2" height="2"/>
    <rect x="590" y="78" width="3" height="3"/>
    <rect x="700" y="95" width="2" height="2"/>
    <rect x="30" y="140" width="2" height="2"/>
    <rect x="75" y="200" width="2" height="2"/>
    <rect x="140" y="260" width="2" height="2"/>
    <rect x="25" y="270" width="3" height="3"/>
  </g>
  <g shape-rendering="crispEdges" fill="#ffffff" opacity="0.5">
    <rect x="60" y="45" width="2" height="2"/>
    <rect x="250" y="30" width="2" height="2"/>
    <rect x="350" y="70" width="2" height="2"/>
    <rect x="500" y="35" width="2" height="2"/>
    <rect x="620" y="45" width="2" height="2"/>
    <rect x="740" y="80" width="2" height="2"/>
    <rect x="160" y="110" width="2" height="2"/>
    <rect x="50" y="180" width="2" height="2"/>
    <rect x="110" y="230" width="2" height="2"/>
    <rect x="15" y="210" width="2" height="2"/>
  </g>
  <g shape-rendering="crispEdges" fill="#ffd700" opacity="0.7">
    <rect x="100" y="35" width="2" height="2"/>
    <rect x="420" y="20" width="2" height="2"/>
    <rect x="680" y="40" width="2" height="2"/>
    <rect x="280" y="65" width="2" height="2"/>
  </g>

  <!-- Starship (pixel art, left side) -->
  <g shape-rendering="crispEdges" transform="translate(55, 70)">
    <!-- Nose cone -->
    <rect x="13" y="0" width="4" height="5" fill="#c0c0c0"/>
    <rect x="11" y="5" width="8" height="5" fill="#d4d4d4"/>
    <rect x="9" y="10" width="12" height="5" fill="#e0e0e0"/>
    <!-- Body -->
    <rect x="7" y="15" width="16" height="40" fill="#e8e8e8"/>
    <rect x="9" y="18" width="12" height="4" fill="#4a9eff"/>
    <rect x="9" y="25" width="12" height="4" fill="#4a9eff"/>
    <rect x="9" y="32" width="12" height="4" fill="#4a9eff"/>
    <!-- Fins -->
    <rect x="1" y="45" width="6" height="15" fill="#c0c0c0"/>
    <rect x="23" y="45" width="6" height="15" fill="#c0c0c0"/>
    <rect x="0" y="50" width="4" height="12" fill="#a0a0a0"/>
    <rect x="26" y="50" width="4" height="12" fill="#a0a0a0"/>
    <!-- Engine section -->
    <rect x="7" y="55" width="16" height="8" fill="#b0b0b0"/>
    <!-- Flame -->
    <rect x="9" y="63" width="12" height="6" fill="#ff6b35"/>
    <rect x="11" y="69" width="8" height="8" fill="#ffa500"/>
    <rect x="13" y="77" width="4" height="6" fill="#ffdd00"/>
    <rect x="10" y="73" width="3" height="5" fill="#ff4500"/>
    <rect x="17" y="73" width="3" height="5" fill="#ff4500"/>
    <rect x="14" y="83" width="2" height="4" fill="#fff3b0"/>
  </g>

  <!-- 8-Bit Elon (center-right) -->
  <g shape-rendering="crispEdges" transform="translate(590, 85)">
    <!-- Hair (dark brown/black) -->
    <rect x="12" y="0" width="40" height="6" fill="#2c1810"/>
    <rect x="8" y="6" width="48" height="6" fill="#2c1810"/>
    <rect x="6" y="12" width="52" height="4" fill="#2c1810"/>

    <!-- Face / Skin -->
    <rect x="6" y="16" width="52" height="40" fill="#f0c8a0"/>
    <!-- Eyes -->
    <rect x="14" y="24" width="10" height="6" fill="#ffffff"/>
    <rect x="40" y="24" width="10" height="6" fill="#ffffff"/>
    <rect x="18" y="24" width="6" height="6" fill="#1a1a2e"/>
    <rect x="44" y="24" width="6" height="6" fill="#1a1a2e"/>
    <rect x="20" y="26" width="2" height="2" fill="#ffffff"/>
    <rect x="46" y="26" width="2" height="2" fill="#ffffff"/>
    <!-- Eyebrows -->
    <rect x="12" y="20" width="14" height="2" fill="#2c1810"/>
    <rect x="38" y="20" width="14" height="2" fill="#2c1810"/>
    <!-- Nose -->
    <rect x="28" y="32" width="8" height="8" fill="#e0b890"/>
    <!-- Mouth (slight smirk) -->
    <rect x="20" y="44" width="24" height="4" fill="#d4836a"/>
    <rect x="18" y="44" width="4" height="2" fill="#e0b890"/>
    <rect x="42" y="44" width="4" height="4" fill="#d4836a"/>

    <!-- Ears -->
    <rect x="0" y="22" width="6" height="12" fill="#f0c8a0"/>
    <rect x="58" y="22" width="6" height="12" fill="#f0c8a0"/>

    <!-- Black t-shirt / body -->
    <rect x="2" y="56" width="60" height="30" fill="#1a1a2e"/>
    <rect x="0" y="60" width="8" height="26" fill="#1a1a2e"/>
    <rect x="56" y="60" width="8" height="26" fill="#1a1a2e"/>
    <!-- Shirt collar -->
    <rect x="22" y="56" width="20" height="4" fill="#111122"/>

    <!-- X logo on shirt (pixel art) -->
    <rect x="24" y="66" width="4" height="4" fill="#ffffff"/>
    <rect x="36" y="66" width="4" height="4" fill="#ffffff"/>
    <rect x="28" y="70" width="8" height="4" fill="#ffffff"/>
    <rect x="24" y="74" width="4" height="4" fill="#ffffff"/>
    <rect x="36" y="74" width="4" height="4" fill="#ffffff"/>
  </g>

  <!-- Title text -->
  <text x="195" y="140" font-family="Courier New, monospace" font-size="36" font-weight="bold" fill="#ffffff" text-anchor="middle">/elon</text>
  <text x="195" y="170" font-family="Courier New, monospace" font-size="12" fill="#8b949e" text-anchor="middle" letter-spacing="3">10-FRAMEWORK</text>
  <text x="195" y="188" font-family="Courier New, monospace" font-size="12" fill="#8b949e" text-anchor="middle" letter-spacing="3">PROBLEM SOLVER</text>

  <!-- Framework list -->
  <g font-family="Courier New, monospace" font-size="9" fill="#58a6ff" letter-spacing="1">
    <text x="195" y="218" text-anchor="middle">FIRST PRINCIPLES / MENTAL MODELS</text>
    <text x="195" y="232" text-anchor="middle">INVERSION / SECOND ORDER / SYSTEMS</text>
    <text x="195" y="246" text-anchor="middle">PROBABILISTIC / OPPORTUNITY COST</text>
    <text x="195" y="260" text-anchor="middle">CONSTRAINTS / REVERSIBILITY / FALSIFY</text>
  </g>

  <!-- Tagline -->
  <text x="400" y="290" text-anchor="middle" font-family="Courier New, monospace" font-size="9" fill="#8b949e" letter-spacing="2">A CLAUDE CODE SKILL FOR THINKING HARDER</text>
</svg>