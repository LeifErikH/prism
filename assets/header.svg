<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="800" height="300">
  <!-- Background: dark navy -->
  <rect width="800" height="300" fill="#0a0e27"/>

  <!-- Stars -->
  <g shape-rendering="crispEdges" fill="#ffffff">
    <rect x="45" y="22" width="2" height="2" opacity="0.8"/>
    <rect x="120" y="48" width="2" height="2" opacity="0.5"/>
    <rect x="195" y="15" width="3" height="3" opacity="0.9"/>
    <rect x="280" y="38" width="2" height="2" opacity="0.4"/>
    <rect x="370" y="12" width="2" height="2" opacity="0.7"/>
    <rect x="520" y="25" width="2" height="2" opacity="0.5"/>
    <rect x="610" y="18" width="3" height="3" opacity="0.8"/>
    <rect x="700" y="42" width="2" height="2" opacity="0.6"/>
    <rect x="755" y="15" width="2" height="2" opacity="0.4"/>
    <rect x="68" y="275" width="2" height="2" opacity="0.5"/>
    <rect x="155" y="265" width="2" height="2" opacity="0.7"/>
    <rect x="230" y="280" width="2" height="2" opacity="0.4"/>
    <rect x="580" y="272" width="2" height="2" opacity="0.6"/>
    <rect x="660" y="260" width="3" height="3" opacity="0.5"/>
    <rect x="735" y="278" width="2" height="2" opacity="0.3"/>
    <rect x="90" y="135" width="2" height="2" opacity="0.3"/>
    <rect x="32" y="190" width="2" height="2" opacity="0.5"/>
    <rect x="748" y="145" width="2" height="2" opacity="0.4"/>
    <rect x="15" y="95" width="2" height="2" opacity="0.6"/>
    <rect x="775" y="200" width="2" height="2" opacity="0.5"/>
  </g>

  <!-- White input beam -->
  <line x1="30" y1="168" x2="338" y2="158" stroke="#ffffff" stroke-width="3" shape-rendering="crispEdges"/>

  <!-- Prism: equilateral triangle, semi-transparent -->
  <polygon points="385,82 318,238 452,238" fill="#141e3d" fill-opacity="0.7" stroke="#3a4a78" stroke-width="2" stroke-linejoin="miter" shape-rendering="crispEdges"/>
  <!-- Inner edge highlight (flat, no glow) -->
  <line x1="385" y1="82" x2="452" y2="238" stroke="#4a5a88" stroke-width="1" shape-rendering="crispEdges" opacity="0.5"/>

  <!-- 10 colored output rays -->
  <g shape-rendering="crispEdges">
    <line x1="422" y1="155" x2="770" y2="48"  stroke="#ff3b30" stroke-width="2.5"/>
    <line x1="423" y1="158" x2="770" y2="72"  stroke="#ff9500" stroke-width="2.5"/>
    <line x1="424" y1="161" x2="770" y2="96"  stroke="#ffcc00" stroke-width="2.5"/>
    <line x1="425" y1="164" x2="770" y2="120" stroke="#34c759" stroke-width="2.5"/>
    <line x1="425" y1="167" x2="770" y2="145" stroke="#30d5c8" stroke-width="2.5"/>
    <line x1="425" y1="170" x2="770" y2="170" stroke="#32ade6" stroke-width="2.5"/>
    <line x1="425" y1="173" x2="770" y2="195" stroke="#007aff" stroke-width="2.5"/>
    <line x1="424" y1="176" x2="770" y2="220" stroke="#5856d6" stroke-width="2.5"/>
    <line x1="423" y1="179" x2="770" y2="245" stroke="#af52de" stroke-width="2.5"/>
    <line x1="422" y1="182" x2="770" y2="270" stroke="#ff2d55" stroke-width="2.5"/>
  </g>

  <!-- Title -->
  <text x="400" y="50" text-anchor="middle" font-family="Courier New, monospace" font-size="36" font-weight="bold" fill="#ffffff" letter-spacing="2">/prism</text>

  <!-- Subtitle -->
  <text x="400" y="72" text-anchor="middle" font-family="Courier New, monospace" font-size="11" fill="#6b7394" letter-spacing="3">10-FRAMEWORK PROBLEM SOLVER</text>

  <!-- Bottom tagline -->
  <text x="400" y="290" text-anchor="middle" font-family="Courier New, monospace" font-size="9" fill="#4a5270" letter-spacing="2">A CLAUDE CODE SKILL FOR THINKING HARDER</text>
</svg>